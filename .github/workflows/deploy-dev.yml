name: Deploy → Dev

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-dev
  cancel-in-progress: false          # never cancel an in-flight deploy

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
  GCP_REGION: asia-south1
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  NAMESPACE: dev
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1 — Build & push eg-web (dev registry)
  # ---------------------------------------------------------------------------
  build-eg-web:
    name: Build eg-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write                # needed for Workload Identity auth to GCP

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/eg-web-dev/eg-web"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./services/eg-web          # ← adjust to your repo structure
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ env.IMAGE_TAG }}
            ${{ steps.meta.outputs.image }}:latest-dev
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:latest-dev
          cache-to: type=inline

  # ---------------------------------------------------------------------------
  # JOB 2 — Build & push eg-strapi (dev registry)
  # ---------------------------------------------------------------------------
  build-eg-strapi:
    name: Build eg-strapi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image metadata
        id: meta
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/eg-strapi-dev/eg-strapi"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./services/eg-strapi       # ← adjust to your repo structure
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ env.IMAGE_TAG }}
            ${{ steps.meta.outputs.image }}:latest-dev
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:latest-dev
          cache-to: type=inline

  # ---------------------------------------------------------------------------
  # JOB 3 — Helm diff + deploy (dev)
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Helm Deploy → Dev
    runs-on: ubuntu-latest
    needs: [build-eg-web, build-eg-strapi]
    permissions:
      contents: read
      id-token: write

    environment:
      name: dev
      url: https://web-dev.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install helm-diff plugin
        run: helm plugin install https://github.com/databus23/helm-diff --version v3.9.4

      - name: Ensure namespace exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ env.NAMESPACE }} \
            environment=dev \
            app.kubernetes.io/managed-by=helm \
            --overwrite

      # ── eg-web ──────────────────────────────────────────────────────────────
      - name: "[eg-web] Helm diff"
        id: diff-web
        run: |
          helm diff upgrade eg-web ./charts/eg-web \
            -f ./charts/eg-web/values.yaml \
            -f ./charts/eg-web/values-dev.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --namespace ${{ env.NAMESPACE }} \
            --allow-unreleased \
            --color \
            --no-hooks \
            2>&1 | tee /tmp/eg-web-diff.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: "[eg-web] Print diff summary"
        run: |
          echo "### eg-web Helm Diff" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cat /tmp/eg-web-diff.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "[eg-web] Helm upgrade"
        run: |
          helm upgrade --install eg-web ./charts/eg-web \
            -f ./charts/eg-web/values.yaml \
            -f ./charts/eg-web/values-dev.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --atomic \
            --timeout 5m \
            --cleanup-on-fail \
            --history-max 5

      - name: "[eg-web] Wait for rollout"
        run: |
          kubectl rollout status deployment/eg-web \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=5m

      - name: "[eg-web] Helm test"
        run: |
          helm test eg-web \
            --namespace ${{ env.NAMESPACE }} \
            --timeout 3m \
            --logs

      # ── eg-strapi ───────────────────────────────────────────────────────────
      - name: "[eg-strapi] Helm diff"
        run: |
          helm diff upgrade eg-strapi ./charts/eg-strapi \
            -f ./charts/eg-strapi/values.yaml \
            -f ./charts/eg-strapi/values-dev.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --namespace ${{ env.NAMESPACE }} \
            --allow-unreleased \
            --color \
            --no-hooks \
            2>&1 | tee /tmp/eg-strapi-diff.txt
          echo "### eg-strapi Helm Diff" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          cat /tmp/eg-strapi-diff.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "[eg-strapi] Helm upgrade"
        run: |
          helm upgrade --install eg-strapi ./charts/eg-strapi \
            -f ./charts/eg-strapi/values.yaml \
            -f ./charts/eg-strapi/values-dev.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --atomic \
            --timeout 8m \
            --cleanup-on-fail \
            --history-max 5

      - name: "[eg-strapi] Wait for rollout"
        run: |
          kubectl rollout status deployment/eg-strapi \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=8m

      - name: "[eg-strapi] Helm test"
        run: |
          helm test eg-strapi \
            --namespace ${{ env.NAMESPACE }} \
            --timeout 5m \
            --logs

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "## Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image Tag | Namespace |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| eg-web  | \`${{ env.IMAGE_TAG }}\` | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| eg-strapi | \`${{ env.IMAGE_TAG }}\` | dev |" >> $GITHUB_STEP_SUMMARY
