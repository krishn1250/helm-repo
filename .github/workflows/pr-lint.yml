# =============================================================================
# .github/workflows/pr-lint.yml
#
# Trigger : every PR to main
# Flow    : helm lint → helm template dry-run (both envs, both charts)
# =============================================================================

name: PR — Helm Lint & Validate

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/**"

jobs:
  lint-and-validate:
    name: Lint & Template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Install helm-diff plugin
        run: helm plugin install https://github.com/databus23/helm-diff --version v3.9.4

      # ── eg-web ──────────────────────────────────────────────────────────────
      - name: "[eg-web] helm lint (dev)"
        run: |
          helm lint ./charts/eg-web \
            -f ./charts/eg-web/values.yaml \
            -f ./charts/eg-web/values-dev.yaml \
            --set image.tag=lint-test \
            --strict

      - name: "[eg-web] helm lint (prod)"
        run: |
          helm lint ./charts/eg-web \
            -f ./charts/eg-web/values.yaml \
            -f ./charts/eg-web/values-prod.yaml \
            --set image.tag=lint-test \
            --strict

      - name: "[eg-web] helm template dry-run (dev)"
        run: |
          helm template eg-web ./charts/eg-web \
            -f ./charts/eg-web/values.yaml \
            -f ./charts/eg-web/values-dev.yaml \
            --set image.tag=lint-test \
            --namespace dev \
            --debug > /dev/null

      - name: "[eg-web] helm template dry-run (prod)"
        run: |
          helm template eg-web ./charts/eg-web \
            -f ./charts/eg-web/values.yaml \
            -f ./charts/eg-web/values-prod.yaml \
            --set image.tag=lint-test \
            --namespace prod \
            --debug > /dev/null

      # ── eg-strapi ───────────────────────────────────────────────────────────
      - name: "[eg-strapi] helm lint (dev)"
        run: |
          helm lint ./charts/eg-strapi \
            -f ./charts/eg-strapi/values.yaml \
            -f ./charts/eg-strapi/values-dev.yaml \
            --set image.tag=lint-test \
            --strict

      - name: "[eg-strapi] helm lint (prod)"
        run: |
          helm lint ./charts/eg-strapi \
            -f ./charts/eg-strapi/values.yaml \
            -f ./charts/eg-strapi/values-prod.yaml \
            --set image.tag=lint-test \
            --strict

      - name: "[eg-strapi] helm template dry-run (dev)"
        run: |
          helm template eg-strapi ./charts/eg-strapi \
            -f ./charts/eg-strapi/values.yaml \
            -f ./charts/eg-strapi/values-dev.yaml \
            --set image.tag=lint-test \
            --namespace dev \
            --debug > /dev/null

      - name: "[eg-strapi] helm template dry-run (prod)"
        run: |
          helm template eg-strapi ./charts/eg-strapi \
            -f ./charts/eg-strapi/values.yaml \
            -f ./charts/eg-strapi/values-prod.yaml \
            --set image.tag=lint-test \
            --namespace prod \
            --debug > /dev/null

      - name: All charts validated
        run: echo "✅ All helm lint + template checks passed"
