{{- if .Values.security.externalSecrets.enabled }}
{{- $esoApiVersion := include "eg-app.externalSecretsApiVersion" . | trim }}
apiVersion: {{ $esoApiVersion }}
kind: ClusterSecretStore
metadata:
  name: {{ .Values.security.externalSecrets.secretStoreRef.name }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.global.project }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.global.region }}
          clusterName: {{ .Values.global.cluster }}
          serviceAccountRef:
            name: {{ .Values.security.externalSecrets.secretStoreRef.serviceAccountName }}
            namespace: {{ .Values.security.externalSecrets.secretStoreRef.serviceAccountNamespace }}
{{- end }}