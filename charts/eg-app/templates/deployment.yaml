apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eg-app.fullname" . }}
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-app.labels" . | nindent 4 }}
  annotations:
    checksum/secrets: {{ include (print $.Template.BasePath "/external-secret.yaml") . | sha256sum }}
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
spec:
  revisionHistoryLimit: {{ .Values.platform.deployment.revisionHistoryLimit | default 3 }}
  {{- if not .Values.platform.hpa.enabled }}
  replicas: {{ .Values.application.replicaCount | default 2 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "eg-app.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "eg-app.labels" . | nindent 8 }}
      {{- with .Values.pod.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eg-app.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.security.serviceAccount.automountToken | default false }}
      terminationGracePeriodSeconds: {{ .Values.application.app.terminationGracePeriodSeconds | default 60 }}
      {{- with .Values.pod.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "eg-app.name" . }}
          image: "{{ .Values.application.image.repository }}:{{ .Values.application.image.tag }}"
          imagePullPolicy: {{ .Values.application.image.pullPolicy | default "IfNotPresent" }}
          {{- with .Values.pod.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.application.app.port | default 3000 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "eg-app.fullname" . }}-config
            {{- range .Values.security.envFromSecrets }}
            - secretRef:
                name: {{ .secretName }}
            {{- end }}
          {{- with .Values.application.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: {{ .Values.application.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.application.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.application.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.application.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.application.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.application.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.application.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.application.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.application.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.application.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.application.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.application.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.application.probes.readiness.timeoutSeconds }}
          {{- with .Values.application.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vite-cache
              mountPath: /tmp/.vite
            - name: vite-temp
              mountPath: /app/node_modules/.vite-temp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: vite-cache
          emptyDir: {}
        - name: vite-temp
          emptyDir: {}