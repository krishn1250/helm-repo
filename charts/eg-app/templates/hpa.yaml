{{- if .Values.platform.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "eg-app.fullname" . }}
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-app.labels" . | nindent 4 }}

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "eg-app.fullname" . }}

  minReplicas: {{ .Values.platform.hpa.minReplicas | default 2 }}
  maxReplicas: {{ .Values.platform.hpa.maxReplicas | default 5 }}

  metrics:
    {{- if .Values.platform.hpa.metrics }}
    {{- toYaml .Values.platform.hpa.metrics | nindent 4 }}
    {{- else }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    {{- end }}

  {{- with .Values.platform.hpa.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}

{{- end }}