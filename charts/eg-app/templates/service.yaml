apiVersion: v1
kind: Service
metadata:
  name: {{ include "eg-app.fullname" . }}
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-app.labels" . | nindent 4 }}
  {{- with .Values.networking.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.networking.service.type | default "ClusterIP" }}
  selector:
    {{- include "eg-app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.networking.service.port | default 3000 }}
      targetPort: {{ .Values.networking.service.targetPort | default 3000 }}
      {{- if .Values.networking.service.nodePort }}
      nodePort: {{ .Values.networking.service.nodePort }}
      {{- end }}