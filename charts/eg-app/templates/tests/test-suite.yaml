---
# ============================================================
# 🧪 Test 7: Replica floor
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-cms.fullname" . }}-test-replicas
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "7"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.security.serviceAccount.name }}
  containers:
    - name: test-replicas
      image: curlimages/curl:8.6.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      env:
        - name: MIN_REPLICAS
          value: "{{ .Values.platform.hpa.minReplicas }}"
        - name: MAX_REPLICAS
          value: "{{ .Values.platform.hpa.maxReplicas }}"
        - name: NAMESPACE
          value: "{{ .Values.environment.namespace }}"
        - name: DEPLOY_NAME
          value: "{{ include "eg-cms.fullname" . }}"
      command:
        - sh
        - -c
        - |
          echo "==> Checking replica count via Kubernetes API..."
          echo "    Expected: min=$MIN_REPLICAS  max=$MAX_REPLICAS"

          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CA="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          API="https://kubernetes.default.svc"

          READY=$(curl -s --cacert "$CA" \
            -H "Authorization: Bearer $TOKEN" \
            "$API/apis/apps/v1/namespaces/$NAMESPACE/deployments/$DEPLOY_NAME" \
            | grep -o '"readyReplicas":[0-9]*' | grep -o '[0-9]*')

          echo "  Ready replicas: $READY"

          if [ -z "$READY" ]; then
            echo "FAIL: Could not read readyReplicas"
            exit 1
          fi

          if [ "$READY" -lt "$MIN_REPLICAS" ]; then
            echo "FAIL: $READY ready replicas is below HPA minimum of $MIN_REPLICAS"
            exit 1
          fi

          if [ "$READY" -gt "$MAX_REPLICAS" ]; then
            echo "FAIL: $READY ready replicas exceeds HPA maximum of $MAX_REPLICAS"
            exit 1
          fi

          echo "PASS: Replica count $READY is within [$MIN_REPLICAS, $MAX_REPLICAS]"