---
# ============================================================
# 🧪 Test 3: Secret injection (CMS secrets)
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-cms.fullname" . }}-test-secrets
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.security.serviceAccount.name }}
  containers:
    - name: test-secrets
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      envFrom:
        {{- range .Values.security.envFromSecrets }}
        - secretRef:
            name: {{ .secretName }}
        {{- end }}
      command:
        - sh
        - -c
        - |
          echo "==> Testing CMS secret injection..."
          FAIL=0

          {{- range .Values.security.externalSecrets.secrets }}
          {{- range .data }}
          VAL=$(printenv {{ .secretKey }} || true)
          if [ -z "$VAL" ]; then
            echo "FAIL: {{ .secretKey }} is missing or empty"
            FAIL=1
          else
            echo "PASS: {{ .secretKey }} is populated"
          fi
          {{- end }}
          {{- end }}

          exit $FAIL

