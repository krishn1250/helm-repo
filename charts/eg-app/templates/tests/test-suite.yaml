---
# ============================================================
# 🧪 Test 1: Liveness endpoint (/admin)
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-cms.fullname" . }}-test-liveness
  namespace: {{ required "environment.namespace must be set" .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.security.serviceAccount.name }}
  containers:
    - name: test-liveness
      image: curlimages/curl:8.6.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      command:
        - sh
        - -c
        - |
          SVC="{{ include "eg-cms.fullname" . }}.{{ .Values.environment.namespace }}.svc.cluster.local:{{ .Values.networking.service.port }}{{ .Values.application.probes.liveness.path }}"
          echo "==> Liveness target: http://$SVC"

          PASS=0
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$SVC")
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              PASS=1
              break
            fi
            sleep 5
          done

          if [ $PASS -eq 1 ]; then
            echo "PASS: Liveness OK"
          else
            echo "FAIL: Liveness did not return 200 after 12 attempts"
            exit 1
          fi

