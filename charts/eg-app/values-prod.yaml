# =============================================================================
# eg-app/values-prod.yaml
# Artifact Registry: asia-south1-docker.pkg.dev/MY_GCP_PROJECT/eg-app-prod
# Namespace: prod
# =============================================================================

namespace: prod

image:
  repository: asia-south1-docker.pkg.dev/MY_GCP_PROJECT/eg-app-prod/eg-app
  tag: "SET_BY_CI"

replicaCount: 3

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

hpa:
  minReplicas: 3
  maxReplicas: 20

podDisruptionBudget:
  minAvailable: 2


topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: eg-app


priorityClassName: high-priority

networkPolicy:
  enabled: true
  ingress:
    # Allow GKE ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
    # Allow same namespace
    - from:
        - podSelector: {}
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # Allow DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow HTTPS to GCP services
    - ports:
        - port: 443
          protocol: TCP
    # Allow Cloud SQL
    - ports:
        - port: 5432
          protocol: TCP


nodeSelector:
  cloud.google.com/gke-nodepool: "eg-app-pool"    # single node-pool shared across namespaces

ingress:
  enabled: true
  className: "gce"
  annotations: {}
  staticIpName: "eg-app-prod-ip"
  extraAnnotations:
    kubernetes.io/ingress.allow-http: "false"
  hosts:
    - host: web.example.com
      paths:
        - path: /
          pathType: Prefix

managedCertificate:
  enabled: true
  domains:
    - web.example.com

externalSecrets:
  secrets:
    - secretName: eg-app-app-secrets
      data:
        - secretKey: API_KEY
          remoteRef:
            key: eg-app-prod-api-key
        - secretKey: DATABASE_URL
          remoteRef:
            key: eg-app-prod-database-url

env:
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "info"
  - name: APP_ENV
    value: "production"
