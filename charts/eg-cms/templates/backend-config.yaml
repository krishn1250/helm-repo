{{- if .Values.backendConfig.enabled }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ include "eg-cms.fullname" . }}-backendconfig
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
spec:
  timeoutSec: {{ .Values.backendConfig.healthCheck.timeoutSec | default 30 }}
  {{- if .Values.backendConfig.connectionDraining.enabled }}
  connectionDraining:
    drainingTimeoutSec: {{ .Values.backendConfig.connectionDraining.drainingTimeoutSec }}
  {{- end }}
  {{- if .Values.backendConfig.sessionAffinity.enabled }}
  sessionAffinity:
    affinityType: {{ .Values.backendConfig.sessionAffinity.affinityType | quote }}
    ttlSec: {{ .Values.backendConfig.sessionAffinity.affinityCookieTtlSec }}
  {{- end }}
  {{- if .Values.backendConfig.healthCheck.enabled }}
  healthCheck:
    checkIntervalSec: {{ .Values.backendConfig.healthCheck.checkIntervalSec }}
    timeoutSec: {{ .Values.backendConfig.healthCheck.timeoutSec }}
    healthyThreshold: {{ .Values.backendConfig.healthCheck.healthyThreshold }}
    unhealthyThreshold: {{ .Values.backendConfig.healthCheck.unhealthyThreshold }}
    port: {{ .Values.backendConfig.healthCheck.port }}
    type: {{ .Values.backendConfig.healthCheck.type | quote }}
    requestPath: {{ .Values.backendConfig.healthCheck.requestPath | quote }}
  {{- end }}
  {{- if .Values.backendConfig.cdn.enabled }}
  cdn:
    enabled: true
    cacheMode: {{ .Values.backendConfig.cdn.cacheMode | quote }}
    defaultTtl: {{ .Values.backendConfig.cdn.defaultTtl }}
    maxTtl: {{ .Values.backendConfig.cdn.maxTtl }}
    negativeCaching: {{ .Values.backendConfig.cdn.negativeCaching }}
    cachePolicy:
      includeHost: {{ .Values.backendConfig.cdn.cachePolicy.includeHost }}
      includeProtocol: {{ .Values.backendConfig.cdn.cachePolicy.includeProtocol }}
      includeQueryString: {{ .Values.backendConfig.cdn.cachePolicy.includeQueryString }}
  {{- end }}
  {{- if .Values.backendConfig.securityPolicy.enabled }}
  securityPolicy:
    name: {{ .Values.backendConfig.securityPolicy.name | quote }}
  {{- end }}
{{- end }}
{{- if .Values.cdnBackendConfig.enabled }}




---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: {{ include "eg-cms.fullname" . }}-backendconfig-cdn
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
spec:
  timeoutSec: {{ .Values.cdnBackendConfig.healthCheck.timeoutSec | default 30 }}
  {{- if .Values.cdnBackendConfig.connectionDraining.enabled }}
  connectionDraining:
    drainingTimeoutSec: {{ .Values.cdnBackendConfig.connectionDraining.drainingTimeoutSec }}
  {{- end }}
  {{- if .Values.cdnBackendConfig.healthCheck.enabled }}
  healthCheck:
    checkIntervalSec: {{ .Values.cdnBackendConfig.healthCheck.checkIntervalSec }}
    timeoutSec: {{ .Values.cdnBackendConfig.healthCheck.timeoutSec }}
    healthyThreshold: {{ .Values.cdnBackendConfig.healthCheck.healthyThreshold }}
    unhealthyThreshold: {{ .Values.cdnBackendConfig.healthCheck.unhealthyThreshold }}
    port: {{ .Values.cdnBackendConfig.healthCheck.port }}
    type: {{ .Values.cdnBackendConfig.healthCheck.type | quote }}
    requestPath: {{ .Values.cdnBackendConfig.healthCheck.requestPath | quote }}
  {{- end }}
  cdn:
    enabled: true
    cacheMode: {{ .Values.cdnBackendConfig.cdn.cacheMode | quote }}
    defaultTtl: {{ .Values.cdnBackendConfig.cdn.defaultTtl }}
    maxTtl: {{ .Values.cdnBackendConfig.cdn.maxTtl }}
    negativeCaching: {{ .Values.cdnBackendConfig.cdn.negativeCaching }}
    cachePolicy:
      includeHost: {{ .Values.cdnBackendConfig.cdn.cachePolicy.includeHost }}
      includeProtocol: {{ .Values.cdnBackendConfig.cdn.cachePolicy.includeProtocol }}
      includeQueryString: {{ .Values.cdnBackendConfig.cdn.cachePolicy.includeQueryString }}
  {{- if .Values.cdnBackendConfig.securityPolicy.enabled }}
  securityPolicy:
    name: {{ .Values.cdnBackendConfig.securityPolicy.name | quote }}
  {{- end }}
{{- end }}