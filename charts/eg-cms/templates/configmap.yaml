apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eg-cms.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.app.env | default .Values.namespace | quote }}
  GCP_REGION: {{ .Values.global.region | quote }}
  GCP_PROJECT: {{ .Values.global.project | quote }}
  CLUSTER_NAME: {{ .Values.global.cluster | quote }}

  DATABASE_CLIENT: {{ .Values.database.client | quote }}
  DATABASE_HOST: {{ .Values.database.host | quote }}
  DATABASE_PORT: {{ .Values.database.port | quote }}
  DATABASE_NAME: {{ .Values.database.name | quote }}
  DATABASE_USERNAME: {{ .Values.database.username | quote }}
  DATABASE_SSL: {{ .Values.database.ssl | quote }}
  DATABASE_SSL_REJECT_UNAUTHORIZED: {{ .Values.database.sslRejectUnauthorized | quote }}

  NODE_TLS_REJECT_UNAUTHORIZED: {{ .Values.node.tlsRejectUnauthorized | quote }}

  GCS_BUCKET_NAME: {{ .Values.gcs.bucketName | quote }}

  {{- with .Values.configMap }}
  {{- toYaml . | nindent 2 }}
  {{- end }}