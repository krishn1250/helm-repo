apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eg-cms.fullname" . }}
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.security.externalSecrets.enabled }}
    checksum/secrets: {{ include (print $.Template.BasePath "/external-secret.yaml") . | sha256sum }}
    {{- end }}
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
spec:
  revisionHistoryLimit: {{ .Values.platform.deployment.revisionHistoryLimit | default 3 }}
  {{- if not .Values.platform.hpa.enabled }}
  replicas: {{ .Values.application.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "eg-cms.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "eg-cms.labels" . | nindent 8 }}
      {{- with .Values.pod.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eg-cms.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.application.app.terminationGracePeriodSeconds | default 60 }}
      securityContext:
        {{- toYaml .Values.pod.securityContext | nindent 8 }}
      {{- with .Values.pod.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "eg-cms.name" . }}
          image: "{{ .Values.application.image.repository }}:{{ .Values.application.image.tag }}"
          imagePullPolicy: {{ .Values.application.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- toYaml .Values.pod.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.application.app.port | default 1337 }}
              protocol: TCP
          # ======================
          # CORE ENV (NON-SECRETS)
          # ======================
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: {{ .Values.application.app.port | default 1337 | quote }}
            - name: NODE_ENV
              value: {{ .Values.application.app.env | default "development" | quote }}
          # ======================
          # CONFIGMAP + SECRETS
          # ======================
          envFrom:
            - configMapRef:
                name: {{ include "eg-cms.fullname" . }}-config
            {{- if and .Values.security.externalSecrets.enabled .Values.security.envFromSecrets }}
            {{- range .Values.security.envFromSecrets }}
            - secretRef:
                name: {{ .secretName }}
            {{- end }}
            {{- end }}
          # ======================
          # PROBES
          # ======================
          startupProbe:
            httpGet:
              path: {{ .Values.application.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.application.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.application.probes.startup.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.application.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.application.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.application.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.application.probes.liveness.failureThreshold }}
            timeoutSeconds: {{ .Values.application.probes.liveness.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.application.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.application.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.application.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.application.probes.readiness.failureThreshold }}
            timeoutSeconds: {{ .Values.application.probes.readiness.timeoutSeconds }}
          # ======================
          # RESOURCES
          # ======================
          {{- with .Values.application.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # ======================
          # VOLUME MOUNTS
          # ======================
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache
            - name: strapi-config
              mountPath: /home/node/.config
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: strapi-config
          emptyDir: {}