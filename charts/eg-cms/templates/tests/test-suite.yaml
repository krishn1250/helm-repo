# ============================================================
# 🧪 Test 4: DNS resolution
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-cms.fullname" . }}-test-dns
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.security.serviceAccount.name }}
  containers:
    - name: test-dns
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      command:
        - sh
        - -c
        - |
          FQDN="{{ include "eg-cms.fullname" . }}.{{ .Values.environment.namespace }}.svc.cluster.local"
          echo "==> DNS resolution for $FQDN..."
          if ! nslookup "$FQDN"; then
            echo "FAIL: DNS resolution failed for $FQDN"
            exit 1
          fi
          echo "PASS: DNS resolved"

