---
# ============================================================
# 🧪 Test 1: Strapi health endpoint
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-cms.fullname" . }}-test-health
  namespace: {{ required "environment.namespace must be set" .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.security.serviceAccount.name }}
  containers:
    - name: test-health
      image: curlimages/curl:8.6.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      command:
        - sh
        - -c
        - |
          echo "==> Testing Strapi /_health endpoint..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://{{ include "eg-cms.fullname" . }}.{{ .Values.environment.namespace }}.svc.cluster.local:{{ .Values.networking.service.port }}/_health)
            echo "Attempt $i: Status=$STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "PASS: /_health returned 200"
              exit 0
            fi
            sleep 5
          done
          echo "FAIL: /_health did not return 200 after 12 attempts"
          exit 1

---
# ============================================================
# 🧪 Test 2: Secret injection — all CMS secrets present
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-cms.fullname" . }}-test-secrets
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.security.serviceAccount.name }}
  containers:
    - name: test-secrets
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      envFrom:
        {{- range .Values.security.envFromSecrets }}
        - secretRef:
            name: {{ .secretName }}
        {{- end }}
      command:
        - sh
        - -c
        - |
          echo "==> Testing secret injection..."
          FAIL=0

          {{- range .Values.security.externalSecrets.secrets }}
          {{- range .data }}
          VAL=$(printenv {{ .secretKey }} || true)
          if [ -z "$VAL" ]; then
            echo "FAIL: {{ .secretKey }} is missing or empty"
            FAIL=1
          else
            echo "PASS: {{ .secretKey }} is populated (length=${#VAL})"
          fi
          {{- end }}
          {{- end }}

          exit $FAIL

---
# ============================================================
# 🧪 Test 3: PVC mount and writability
# ============================================================
{{- if .Values.volumes.persistence.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-cms.fullname" . }}-test-pvc
  namespace: {{ .Values.environment.namespace }}
  labels:
    {{- include "eg-cms.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  serviceAccountName: {{ .Values.security.serviceAccount.name }}
  containers:
    - name: test-pvc
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      command:
        - sh
        - -c
        - |
          echo "==> Testing PVC mount and writability..."
          TEST_FILE="{{ .Values.volumes.persistence.mountPath }}/.helm-test-probe"
          echo "helm-test" > "$TEST_FILE"
          if [ $? -ne 0 ]; then
            echo "FAIL: Cannot write to {{ .Values.volumes.persistence.mountPath }}"
            exit 1
          fi
          rm -f "$TEST_FILE"
          echo "PASS: PVC at {{ .Values.volumes.persistence.mountPath }} is writable"
      volumeMounts:
        - name: uploads
          mountPath: {{ .Values.volumes.persistence.mountPath }}
  volumes:
    - name: uploads
      persistentVolumeClaim:
        claimName: {{ include "eg-cms.fullname" . }}-uploads
{{- end }}

