image:
  repository: "europe-west2-docker.pkg.dev/enhanced-games-gc/eg-dev-cms/eg-cms"
  tag: "v1.1.0"

global:
  project: enhanced-games-gc
  region: europe-west2
  cluster: eg-cluster

app:
  port: 1337
  name: "cms"
  env: "development"
  terminationGracePeriodSeconds: 60

podDisruptionBudget:
  enabled: false

namespace: dev-eg



database:
  client: "postgres"
  host: "10.13.0.5"
  port: "5432"
  name: "postgres"
  username: "postgres"
  ssl: "true"
  sslRejectUnauthorized: "false"

node:
  tlsRejectUnauthorized: "0"

gcs:
  bucketName: "eg-dev-bucket"

deployment:
  revisionHistoryLimit: 3



replicaCount: 2

configMap:
  LOG_LEVEL: "debug"
  PORT: "1337"

namespaceLabels:
  environment: dev
  team: enhanced-games

nodeSelector:
  cloud.google.com/gke-nodepool: "eg-dev-app-np"

networkPolicy:
  enabled: false

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"



probes:
  liveness:
    path: /admin
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5
  readiness:
    path: /admin
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  startup:
    path: /admin
    failureThreshold: 30
    periodSeconds: 10

service:
  type: ClusterIP
  port: 1337
  targetPort: 1337
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"ports": {"1337":"eg-cms-backendconfig"}}'

backendConfig:
  enabled: true
  healthCheck:
    enabled: true
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    port: 1337
    type: HTTP
    requestPath: "/admin"
  sessionAffinity:
    enabled: false
    affinityType: "GENERATED_COOKIE"
    affinityCookieTtlSec: 3600
  connectionDraining:
    enabled: true
    drainingTimeoutSec: 60
  cdn:
    enabled: false
    cachePolicy:
      includeHost: false
      includeProtocol: false
      includeQueryString: false
  securityPolicy:
    enabled: true
    name: eg-dev-security-policy

externalSecrets:
  enabled: true
  createSecretStore: false
  secretStoreRef:
    name: gcp-dev-secret-store
    kind: ClusterSecretStore
    serviceAccountName: gke-workload-sa
    serviceAccountNamespace: dev-eg

  secrets:
    - secretName: eg-dev-strapi-secrets
      data:
        - secretKey: DATABASE_PASSWORD
          remoteRef:
            key: eg-dev-db-password

        - secretKey: APP_KEYS
          remoteRef:
            key: eg-dev-app-keys

        - secretKey: API_TOKEN_SALT
          remoteRef:
            key: eg-dev-api-token-salt

        - secretKey: ADMIN_JWT_SECRET
          remoteRef:
            key: eg-dev-admin-jwt

        - secretKey: TRANSFER_TOKEN_SALT
          remoteRef:
            key: eg-dev-transfer-token

        - secretKey: ENCRYPTION_KEY
          remoteRef:
            key: eg-dev-encryption-key
        - secretKey: JWT_SECRET
          remoteRef:
            key: eg-dev-jwt-secret

envFromSecrets: 
  - secretName: eg-dev-strapi-secrets

persistence:
  enabled: false
  mountPath: ""
  size: ""
  storageClass: ""
  accessMode: ReadWriteOnce

auth:
  workloadIdentity:
    clusterLocation: europe-west2
    clusterName: eg-cluster
    serviceAccountRef:
      name: gke-workload-sa

tolerations:
  - key: "environment"
    operator: "Equal"
    value: "development"
    effect: "NoSchedule"

serviceAccount:
  create: false
  name: gke-workload-sa
  annotations:
    iam.gke.io/gcp-service-account: eg-workload-sa@enhanced-games-gc.iam.gserviceaccount.com

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120



