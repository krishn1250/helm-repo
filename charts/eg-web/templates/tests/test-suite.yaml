---
# Test 1: Liveness endpoint responds 200
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "eg-app.fullname" . }}-test-liveness
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "eg-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-liveness
      image: curlimages/curl:8.6.0
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      command:
        - sh
        - -c
        - |
          echo "==> Testing liveness endpoint..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://{{ include "eg-app.fullname" . }}.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.service.port }}/healthz)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /healthz returned $STATUS, expected 200"
            exit 1
          fi
          echo "PASS: /healthz returned 200"
