global:
  project: "enhanced-games-gc"
  cluster: "eg-cluster"
  region: "europe-west2"

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

namespace: ""

namespaceLabels:
  environment:
  team: 

namespaceAnnotations: {}

replicaCount: 

nodeSelector: {}

app:
  port: 3000
  terminationGracePeriodSeconds: 60

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: ""
  maxReplicas: ""
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: ""
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: ""
  behavior:
    scaleUp:
      stabilizationWindowSeconds: ""
      policies:
        - type: Pods
          value: ""
          periodSeconds: ""
    scaleDown:
      stabilizationWindowSeconds: ""
      policies:
        - type: Pods
          value: ""
          periodSeconds: ""

service:
  type: NodePort
  port: 3000
  targetPort: 3000
  annotations: {}

managedCertificate:
  enabled: true
  domains: []  


ingress:
  enabled: true
  className: "gce"
  annotations:
    kubernetes.io/ingress.class: "gce"
  staticIpName: ""      
  backendConfig: ""     
  extraAnnotations: {}
  hosts: []      

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 30
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 5
  readiness:
    path: /readyz
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5
  startup:
    path: /healthz
    failureThreshold: 30
    periodSeconds: 10


externalSecrets:
  enabled: true
  refreshInterval: ""
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  secrets: []   

env:
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "info"

envFromSecrets:
  - secretName: ""

networkPolicy:
  enabled: false
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP

podDisruptionBudget:
  enabled: true
  minAvailable: 1



podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""
  annotations:
    iam.gke.io/gcp-service-account: ""



tolerations: []

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

auth:
  workloadIdentity:
    serviceAccountRef:
      name: ""
      namespace: ""


backendConfig:
  enabled: false
  healthCheck:
    enabled: true
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    port: 3000
    type: HTTP
    requestPath: "/healthz"
  sessionAffinity:
    enabled: false
    affinityType: "GENERATED_COOKIE"
    affinityCookieTtlSec: 3600
  connectionDraining:
    enabled: true
    drainingTimeoutSec: 60
  cdn:
    enabled: false
  securityPolicy:
    enabled: false
    name: ""